let S={user:null,authLoading:true,events:[],view:'home',month:new Date(),selected:null,editing:null,search:'',filter:'all',sync:'synced',loading:false,form:null,reportMonth:new Date().getMonth(),reportYear:new Date().getFullYear()};

const newForm=()=>({clientName:'',clientPhone:'',clientEmail:'',eventDate:'',eventTime:'',location:'',weddingPlanner:'',plannerCommission:10,services:[],totalAmount:'',depositAmount:'',paymentStatus:'pendiente',facturaEmitida:false,rfcCliente:'',expenses:[],notes:''});
S.form=newForm();

auth.onAuthStateChanged(u=>{S.user=u;S.authLoading=false;if(u)loadEvents();else{S.events=[];render();}});

async function login(){
  const email=document.getElementById('lemail').value;
  const pass=document.getElementById('lpass').value;
  try{await auth.signInWithEmailAndPassword(email,pass);}
  catch(e){document.getElementById('lerror').textContent=e.code.includes('invalid')?'Email o contraseña incorrectos':'Error de conexión';document.getElementById('lerror').style.display='block';}
}
function logout(){if(confirm('¿Cerrar sesión?'))auth.signOut();}

async function loadEvents(){
  S.loading=true;S.sync='syncing';render();
  try{const snap=await db.collection('events').orderBy('eventDate','asc').get();S.events=snap.docs.map(d=>({id:d.id,...d.data()}));S.sync='synced';}
  catch(e){S.sync='error';const l=localStorage.getItem('lpp');if(l)S.events=JSON.parse(l);}
  S.loading=false;render();
}

async function saveEvent(data){
  S.sync='syncing';
  try{
    if(data.id){await db.collection('events').doc(data.id).set(data);}
    else{const ref=await db.collection('events').add(data);data.id=ref.id;}
    const i=S.events.findIndex(e=>e.id===data.id);
    if(i>=0)S.events[i]=data;else S.events.push(data);
    localStorage.setItem('lpp',JSON.stringify(S.events));
    S.sync='synced';
  }catch(e){S.sync='error';}
  render();
}

async function deleteEvent(id){
  S.sync='syncing';
  try{await db.collection('events').doc(id).delete();S.events=S.events.filter(e=>e.id!==id);localStorage.setItem('lpp',JSON.stringify(S.events));S.sync='synced';}
  catch(e){S.sync='error';}
  render();
}

const fmt=n=>new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN'}).format(n||0);
const fmtD=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short'}):'';
const fmtDL=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):'';
const comm=(t,p)=>(parseFloat(t)||0)*(parseFloat(p)||0)/100;
const expT=ex=>(ex||[]).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
const profit=ev=>(ev.totalAmount||0)-comm(ev.totalAmount,ev.plannerCommission)-expT(ev.expenses);

function setView(v){S.view=v;render();if(v==='dashboard')setTimeout(renderChart,100);}

function getF(id){const el=document.getElementById(id);return el?el.value:'';}

function submitForm(){
  const f={
    clientName:getF('fName'),clientPhone:getF('fPhone'),clientEmail:getF('fEmail'),
    eventDate:getF('fDate'),eventTime:getF('fTime'),location:getF('fLoc'),
    weddingPlanner:getF('fPlanner'),plannerCommission:parseFloat(getF('fComm'))||10,
    services:S.form.services,totalAmount:parseFloat(getF('fTotal'))||0,depositAmount:parseFloat(getF('fDeposit'))||0,
    paymentStatus:S.form.paymentStatus,facturaEmitida:S.form.facturaEmitida,rfcCliente:getF('fRfc'),
    expenses:S.form.expenses,notes:getF('fNotes'),
    createdAt:S.editing?S.editing.createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()
  };
  if(!f.clientName||!f.eventDate||!f.totalAmount){alert('Completa los campos requeridos');return;}
  if(S.editing)f.id=S.editing.id;
  saveEvent(f);
  S.form=newForm();S.editing=null;S.view='home';render();
}

function editEv(ev){S.form={...ev,expenses:ev.expenses||[]};S.editing=ev;S.view='form';render();}
function delEv(id){if(confirm('¿Eliminar?')){deleteEvent(id);S.selected=null;S.view='home';render();}}
function toggleSvc(id){const i=S.form.services.indexOf(id);if(i>=0)S.form.services.splice(i,1);else S.form.services.push(id);render();}
function setPay(p){S.form.paymentStatus=p;render();}
function addExp(){S.form.expenses.push({category:'ingredientes',description:'',amount:''});render();}
function rmExp(i){S.form.expenses.splice(i,1);render();}
function setExp(i,k,v){S.form.expenses[i][k]=v;}
function toggleFac(){S.form.facturaEmitida=!S.form.facturaEmitida;render();}
async function markFac(id){const ev=S.events.find(e=>e.id===id);if(ev){ev.facturaEmitida=true;await saveEvent(ev);S.selected=ev;}}

function share(){
  const up=S.events.filter(e=>new Date(e.eventDate)>=new Date()).sort((a,b)=>new Date(a.eventDate)-new Date(b.eventDate)).slice(0,10);
  let m='🎂 LA PETITE PARISIENNE\n━━━━━━━━━━━━━━\n\n';
  up.forEach(e=>{m+=(e.paymentStatus==='pagado'?'✅':e.paymentStatus==='anticipo'?'🟡':'🔴')+' '+fmtD(e.eventDate)+'\n   '+e.clientName+'\n   📍 '+e.location+'\n   💰 '+fmt(e.totalAmount)+'\n\n';});
  window.open('https://wa.me/?text='+encodeURIComponent(m),'_blank');
}

function rHome(){
  const evs=S.events.filter(e=>{
    const ms=(e.clientName||'').toLowerCase().includes(S.search.toLowerCase())||(e.location||'').toLowerCase().includes(S.search.toLowerCase());
    return ms&&(S.filter==='all'||e.paymentStatus===S.filter);
  }).sort((a,b)=>new Date(a.eventDate)-new Date(b.eventDate));
  const tot=S.events.reduce((s,e)=>s+(e.totalAmount||0),0);

function rCal(){
  const M=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const D=['D','L','M','M','J','V','S'];
  const y=S.month.getFullYear(),m=S.month.getMonth();
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const days=[];for(let i=0;i<first.getDay();i++)days.push(null);for(let i=1;i<=last.getDate();i++)days.push(new Date(y,m,i));
  const mEvs=S.events.filter(e=>{const d=new Date(e.eventDate);return d.getMonth()===m&&d.getFullYear()===y;}).sort((a,b)=>new Date(a.eventDate)-new Date(b.eventDate));
  
  let h='<div class="header" style="display:flex;justify-content:space-between;align-items:center"><button onclick="S.month=new Date(S.month.getFullYear(),S.month.getMonth()-1);render()" style="padding:8px">'+IC.back+'</button><h2 style="font-size:18px;font-weight:600">'+M[m]+' '+y+'</h2><button onclick="S.month=new Date(S.month.getFullYear(),S.month.getMonth()+1);render()" style="padding:8px;transform:rotate(180deg)">'+IC.back+'</button></div>';
  h+='<div style="padding:0 12px"><div style="display:grid;grid-template-columns:repeat(7,1fr)">';D.forEach(d=>{h+='<div style="text-align:center;font-size:12px;font-weight:600;color:#9ca3af;padding:8px">'+d+'</div>';});h+='</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">';
  days.forEach(d=>{
    if(!d){h+='<div></div>';return;}
    const ds=d.toISOString().split('T')[0];
    const evs=S.events.filter(e=>e.eventDate===ds);
    const today=d.toDateString()===new Date().toDateString();
    h+='<div onclick="'+(evs.length?'S.selected=S.events.find(x=>x.id===\''+evs[0].id+'\');setView(\'detail\')':'')+'" class="calendar-day '+(today?'today':'')+(evs.length&&!today?' has-events':'')+'">'+d.getDate();
    if(evs.length){h+='<div style="display:flex;gap:2px">';evs.slice(0,3).forEach(e=>{h+='<div class="calendar-dot" style="background:'+(e.paymentStatus==='pagado'?'#22c55e':e.paymentStatus==='anticipo'?'#f59e0b':'#ef4444')+'"></div>';});h+='</div>';}
    h+='</div>';
  });
  h+='</div></div>';
  h+='<div style="flex:1;overflow-y:auto;padding:16px 20px"><p style="font-size:12px;font-weight:600;color:#9ca3af;margin-bottom:12px">EVENTOS DEL MES</p>';
  mEvs.forEach(e=>{h+='<div onclick="S.selected=S.events.find(x=>x.id===\''+e.id+'\');setView(\'detail\')" style="display:flex;align-items:center;gap:12px;padding:12px;background:#f9fafb;border-radius:12px;margin-bottom:8px"><div style="width:4px;height:48px;border-radius:4px;background:'+(e.paymentStatus==='pagado'?'#22c55e':e.paymentStatus==='anticipo'?'#f59e0b':'#ef4444')+'"></div><div style="flex:1"><p style="font-weight:500">'+e.clientName+'</p><p style="font-size:14px;color:#6b7280">'+fmtD(e.eventDate)+'</p></div><p style="font-weight:600">'+fmt(e.totalAmount)+'</p></div>';});
  h+='</div>';
  return h;
}

function genReport(){
  const M=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const evs=S.events.filter(e=>{const d=new Date(e.eventDate);return d.getMonth()===S.reportMonth&&d.getFullYear()===S.reportYear;});
  const rev=evs.reduce((s,e)=>s+(e.totalAmount||0),0);
  const exp=evs.reduce((s,e)=>s+expT(e.expenses),0);
  const com=evs.reduce((s,e)=>s+comm(e.totalAmount,e.plannerCommission),0);
  let r='📊 REPORTE '+M[S.reportMonth]+' '+S.reportYear+'\n━━━━━━━━━━━━━━\n\n• Eventos: '+evs.length+'\n• Ingresos: '+fmt(rev)+'\n• Gastos: '+fmt(exp)+'\n• Comisiones: '+fmt(com)+'\n• Ganancia: '+fmt(rev-exp-com);
  if(navigator.share)navigator.share({text:r});else{navigator.clipboard.writeText(r);alert('Copiado!');}
}

function renderChart(){
  const ctx=document.getElementById('chart');if(!ctx)return;
  if(chart)chart.destroy();
  const y=new Date().getFullYear();
  const ms=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const data=ms.map((_,i)=>{const evs=S.events.filter(e=>{const d=new Date(e.eventDate);return d.getMonth()===i&&d.getFullYear()===y;});return evs.reduce((s,e)=>s+(e.totalAmount||0),0);});
  chart=new Chart(ctx,{type:'bar',data:{labels:ms,datasets:[{label:'Ingresos',data:data,backgroundColor:'rgba(34,197,94,0.8)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>'$'+(v/1000)+'k'}}}}});
}

  h+='</div></div></div>';
  
  h+='<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:12px"><p style="font-size:12px;font-weight:600;color:#9ca3af">GASTOS</p><button onclick="addExp()" style="font-size:14px;color:#f43f5e;font-weight:500">+ Agregar</button></div>';
  f.expenses.forEach((e,i)=>{h+='<div class="expense-row"><select onchange="setExp('+i+',\'category\',this.value)" style="width:50px;padding:8px;background:transparent">';EXP.forEach(c=>{h+='<option value="'+c.id+'" '+(e.category===c.id?'selected':'')+'>'+c.icon+'</option>';});h+='</select><input value="'+(e.description||'')+'" onchange="setExp('+i+',\'description\',this.value)" placeholder="Descripción" style="flex:1;padding:8px;background:transparent"><input type="number" value="'+(e.amount||'')+'" onchange="setExp('+i+',\'amount\',this.value)" placeholder="$" style="width:70px;padding:8px;background:transparent;text-align:right"><button onclick="rmExp('+i+')" style="color:#ef4444;padding:4px">'+IC.x+'</button></div>';});
  h+='</div>';
  
  h+='<div class="card" style="background:linear-gradient(135deg,#fff1f2,#fffbeb)"><h4 style="font-weight:600;margin-bottom:8px">Resumen</h4><div style="font-size:14px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>Ingreso</span><span>'+fmt(f.totalAmount)+'</span></div><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>Comisión</span><span style="color:#ea580c">-'+fmt(com)+'</span></div><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>Gastos</span><span style="color:#dc2626">-'+fmt(exp)+'</span></div><div style="display:flex;justify-content:space-between;font-size:18px;font-weight:700;margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,0,0,0.1)"><span>Ganancia</span><span style="color:#16a34a">'+fmt(pr)+'</span></div></div></div>';
  
  h+='<div class="card"><p style="font-size:12px;font-weight:600;color:#9ca3af;margin-bottom:12px">FACTURACIÓN</p>';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:12px;background:#f9fafb;border-radius:12px;margin-bottom:12px"><div style="display:flex;align-items:center;gap:12px"><span style="font-size:20px">📄</span><span style="font-weight:500">Factura emitida</span></div><button onclick="toggleFac()" class="toggle '+(f.facturaEmitida?'active':'')+'"><div class="toggle-knob"></div></button></div>';
  h+='<div><label style="font-size:14px;color:#6b7280;display:block;margin-bottom:4px">RFC Cliente</label><input id="fRfc" value="'+(f.rfcCliente||'')+'" placeholder="XAXX010101000" maxlength="13" style="text-transform:uppercase"></div></div>';
  
  h+='<div class="card"><p style="font-size:12px;font-weight:600;color:#9ca3af;margin-bottom:12px">NOTAS</p><textarea id="fNotes" rows="3" placeholder="Detalles adicionales..." style="resize:none">'+(f.notes||'')+'</textarea></div>';
  h+='</div>';
  return h;
}

function rSettings(){
  let h='<div class="header"><h2 style="font-size:24px;font-weight:700">Ajustes</h2></div>';
  h+='<div style="flex:1;overflow-y:auto;padding:16px 20px">';
  h+='<div class="card" style="padding:0;overflow:hidden"><button onclick="const d=JSON.stringify(S.events,null,2);const b=new Blob([d],{type:\'application/json\'});const u=URL.createObjectURL(b);const a=document.createElement(\'a\');a.href=u;a.download=\'backup.json\';a.click();" style="width:100%;display:flex;align-items:center;gap:16px;padding:16px;border-bottom:1px solid #f3f4f6"><div style="width:40px;height:40px;background:#eff6ff;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#3b82f6">'+IC.dl+'</div><div style="text-align:left"><p style="font-weight:500">Exportar Datos</p><p style="font-size:14px;color:#6b7280">Backup JSON</p></div></button>';
  h+='<label style="width:100%;display:flex;align-items:center;gap:16px;padding:16px;cursor:pointer"><div style="width:40px;height:40px;background:#f0fdf4;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#22c55e">'+IC.dl+'</div><div style="text-align:left"><p style="font-weight:500">Importar Datos</p><p style="font-size:14px;color:#6b7280">Restaurar backup</p></div><input type="file" accept=".json" onchange="const r=new FileReader();r.onload=async e=>{try{const d=JSON.parse(e.target.result);for(const ev of d)await saveEvent(ev);alert(\'Importado!\');}catch(e){alert(\'Error\');}};r.readAsText(this.files[0]);" style="display:none"></label></div>';
  h+='<div style="text-align:center;margin-top:24px"><p style="color:#6b7280;font-size:14px;margin-bottom:8px">👤 '+S.user.email+'</p><p style="color:#9ca3af;font-size:14px">'+S.events.length+' eventos</p><p style="color:#d1d5db;font-size:12px;margin-top:4px">La Petite Parisienne v3.0</p><button onclick="logout()" style="margin-top:16px;padding:12px 24px;background:#fef2f2;color:#dc2626;border-radius:12px;font-weight:500">Cerrar sesión</button></div></div>';
  return h;
}

function render(){
  let h='';
  if(S.authLoading){h='<div class="loading"><div class="spinner"></div></div>';}
  else if(!S.user){h=rLogin();}
  else if(S.loading){h='<div class="loading"><div class="spinner"></div></div>';}
  else{
    if(S.view==='home')h=rHome();
    else if(S.view==='calendar')h=rCal();
    else if(S.view==='dashboard')h=rDash();
    else if(S.view==='detail')h=rDetail();
    else if(S.view==='form')h=rForm();
    else if(S.view==='settings')h=rSettings();
    if(['home','calendar','dashboard','settings'].includes(S.view))h+=rTabs();
  }
  document.getElementById('app').innerHTML=h;
}

render();
</script>
</body>
</html>
